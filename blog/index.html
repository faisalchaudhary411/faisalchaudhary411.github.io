<script>
  const container = document.getElementById('posts-container');
  const debugInfo = [];

  // ── EMBEDDED FALLBACK: your actual post data ──
  const FALLBACK_POSTS = [
    {
      "id": "post_1782144902",
      "title": "Best Free Text-to-Speech Tools in 2026 (Tested)",
      "category": "Comparison",
      "excerpt": "We tested the top free TTS tools in 2026 so you don't have to — here's what's actually worth using.",
      "body": "If you need to convert text into natural-sounding speech in 2026, you have more free options than ever — but most \"free\" tools have a catch: watermarks, character limits, robotic voices, or a forced signup wall.\n\nWe tested the most popular free text-to-speech tools available right now to see which ones actually deliver good audio without the usual catches. Here's an honest breakdown.\n\nWhat We Looked For\nEvery tool was tested on the same three things: voice quality, how much you can generate for free, and how many hoops you have to jump through to download your audio.\n\nElevenLabs (Free Tier)\nElevenLabs is widely considered the gold standard for AI voice quality, and the free tier voices are genuinely impressive — closer to a real human than most competitors.\n\nThe catch is the free tier character limit resets monthly and runs out fast if you're doing anything beyond short clips. Once you hit the limit, you're looking at a paid plan to continue.\n\nBest for: short, high-stakes clips where voice realism matters most (ads, trailers).\n\nMurf AI\nMurf focuses on studio-style voiceovers with editing tools built around video timing. The voices are solid, and the editor is genuinely useful if you're syncing narration to video.\n\nThe free trial is time-limited rather than unlimited, and exporting without a watermark requires upgrading.\n\nBest for: video creators who want a built-in timeline editor, not just raw audio.\n\nMicrosoft Edge Neural Voices (via free tools like VoxCraft)\nMicrosoft's Edge neural voices are an underrated option — they're the same engine that powers Edge browser's \"Read Aloud\" feature, and they're surprisingly natural for a free, unlimited resource.\n\nTools like VoxCraft package these voices into a simple web interface: paste text, pick from 70+ voices across multiple languages and accents, generate, and download an MP3 with no watermark and no signup.\n\nThe tradeoff is that voice emotion and inflection control is more limited than ElevenLabs — these are great for narration, tutorials, and accessibility use cases, less ideal for dramatic ad reads.\n\nBest for: anyone who needs reliable, unlimited, free TTS without account creation — YouTubers, students, accessibility users, and indie creators on a budget.\n\nNaturalReader (Free Tier)\nNaturalReader has been around for years and remains a dependable option, particularly for longer documents like PDFs and articles.\n\nThe free tier works well for reading text aloud but is more limited when it comes to downloading audio files — many download features sit behind the paid tier.\n\nBest for: reading documents aloud rather than producing downloadable audio files.\n\nTTSMaker\nTTSMaker offers a generous free character limit and a wide voice selection, making it a popular pick among content creators on tighter budgets.\n\nVoice quality is solid but noticeably more robotic than ElevenLabs or Edge neural voices on longer, more expressive passages.\n\nBest for: bulk content where voice realism is secondary to volume and cost.\n\nSo Which Should You Actually Use?\nIf you want the single most realistic voice for a short clip, ElevenLabs free tier is hard to beat — just watch your character budget. If you're producing regular long-form content like YouTube narration, tutorials, or audiobook samples and want zero signup friction, free neural-voice tools like VoxCraft hit the best balance of quality, speed, and no watermark.\n\nThere's no single \"best\" tool — it depends on whether you're optimizing for maximum realism on short clips or unlimited, frictionless output for regular content production.\n\nTry It Yourself\nVoxCraft gives you access to 70+ neural voices, batch text-to-speech, audio format conversion, background noise removal, and more — completely free, with Pro available if you need higher limits and zero ads.",
      "date": "Jun 22, 2026",
      "published": true
    }
  ];

  function renderPosts(posts, sourceName) {
    if (!posts || !posts.length) {
      debugInfo.push(sourceName + ' was empty.');
      return false;
    }
    container.innerHTML = posts.map((post, idx) => `
      <article class="post-card" onclick="openPost(${idx})">
        <div class="post-date">${post.date || 'No date'}</div>
        <h2 class="post-title">${post.title || 'Untitled'}</h2>
        <p class="post-excerpt">${(post.excerpt || post.body || '').substring(0, 160)}…</p>
        ${(post.tag || post.category) ? `<span class="post-tag">${post.tag || post.category}</span>` : ''}
      </article>
    `).join('');
    window._posts = posts;
    console.log('[VoxCraft Blog] Loaded from:', sourceName, '| Posts:', posts.length);
    return true;
  }

  function openPost(idx) {
    const post = window._posts[idx];
    if (!post) return;
    document.getElementById('modal-title').textContent = post.title || 'Untitled';
    document.getElementById('modal-meta').textContent = (post.date || '') + (post.author ? ' · by ' + post.author : '');
    let body = (post.body || post.excerpt || 'No content.').replace(/\n/g, '<br>');
    document.getElementById('modal-body').innerHTML = '<p>' + body + '</p>';
    document.getElementById('modal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  async function loadPosts() {
    // Try external files first, fallback to embedded data
    const sources = [
      { url: '/blogs.json', name: 'blogs.json' },
      { url: '/blog_posts.json', name: 'blog_posts.json' },
      { url: 'https://raw.githubusercontent.com/faisalchaudhary411/faisalchaudhary411.github.io/main/blogs.json', name: 'GitHub raw (blogs.json)' },
      { url: 'https://raw.githubusercontent.com/faisalchaudhary411/faisalchaudhary411.github.io/main/blog_posts.json', name: 'GitHub raw (blog_posts.json)' }
    ];

    for (const src of sources) {
      try {
        const res = await fetch(src.url + '?t=' + Date.now());
        if (!res.ok) {
          debugInfo.push(src.name + ' HTTP ' + res.status);
          continue;
        }
        const text = await res.text();
        if (!text || !text.trim()) {
          debugInfo.push(src.name + ' was blank.');
          continue;
        }
        let data;
        try {
          data = JSON.parse(text);
        } catch (parseErr) {
          debugInfo.push(src.name + ' JSON parse error.');
          continue;
        }
        if (Array.isArray(data) && data.length) {
          if (renderPosts(data, src.name)) return;
        } else {
          debugInfo.push(src.name + ' returned empty array.');
        }
      } catch (err) {
        debugInfo.push(src.name + ' network/fetch error.');
      }
    }

    // ── FALLBACK: use embedded posts so the blog ALWAYS works ──
    console.log('[VoxCraft Blog] All external sources failed. Using embedded fallback.', debugInfo);
    renderPosts(FALLBACK_POSTS, 'embedded fallback');
  }

  loadPosts();
</script>
