<main>

    <a href="/">Home</a> <span>/</span> <span>Blog</span>

  <script async="async" data-cfasync="false" src="//pl29723111.effectivecpmnetwork.com/5b0c617f15e7e87967b22cafcc23e1b7/invoke.js"></script>
  <div id="container-5b0c617f15e7e87967b22cafcc23e1b7"></div>
</div>

<script>
  const container = document.getElementById('posts-container');

  function renderPosts(posts) {
    if (!posts || !posts.length) {
      container.innerHTML = '<div class="empty">No blog posts yet. Check back soon!</div>';
      return;
    }
    container.innerHTML = posts.map((post, idx) => `
      <article class="post-card" onclick="openPost(${idx})">
        <div class="post-date">${post.date || 'No date'}</div>
        <h2 class="post-title">${post.title || 'Untitled'}</h2>
        <p class="post-excerpt">${(post.excerpt || post.body || '').substring(0, 160)}…</p>
        ${post.tag ? `<span class="post-tag">${post.tag}</span>` : ''}
      </article>
    `).join('');
    window._posts = posts;
  }

  function openPost(idx) {
    const post = window._posts[idx];
    if (!post) return;
    document.getElementById('modal-title').textContent = post.title || 'Untitled';
    document.getElementById('modal-meta').textContent = (post.date || '') + (post.author ? ' · by ' + post.author : '');
    let body = (post.body || post.excerpt || 'No content.').replace(/\n/g, '<br>');
    document.getElementById('modal-body').innerHTML = '<p>' + body + '</p>';
    document.getElementById('modal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  async function loadPosts() {
    const sources = ['/blog_posts.json', '/blog.json', '/blog_posts.yml'];
    for (const url of sources) {
      try {
        const res = await fetch(url + '?t=' + Date.now());
        if (!res.ok) continue;
        const text = await res.text();
        let data;
        if (url.endsWith('.yml') || url.endsWith('.yaml')) {
          const lines = text.split('\n');
          const posts = [];
          let current = null, inFrontMatter = false;
          for (const line of lines) {
            if (line.trim() === '---') {
              if (!inFrontMatter) { inFrontMatter = true; current = {}; }
              else { inFrontMatter = false; posts.push(current); current = null; }
            } else if (inFrontMatter && current) {
              const m = line.match(/^(\w+):\s*(.*)$/);
              if (m) current[m[1]] = m[2].replace(/^["']|["']$/g, '');
            } else if (current && !inFrontMatter) {
              if (!current.body) current.body = '';
              current.body += line + '\n';
            }
          }
          data = posts;
        } else {
          data = JSON.parse(text);
        }
        if (Array.isArray(data) && data.length) {
          renderPosts(data);
          return;
        }
      } catch (e) { /* try next */ }
    }
    container.innerHTML = '<div class="error">Could not load blog posts. Please check your blog_posts.json or blog.json file.</div>';
  }

  loadPosts();
</script>
