name: Generate Blog Posts

on:
  push:
    paths:
      - 'blog_posts.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate static blog
        run: python3 scripts/generate_blog.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml
          git diff --cached --quiet || git commit -m "Auto-generate blog posts from CMS"
          git push
